# Example "minimal" Skyforge install (Helm values overlay).
#
# Notes:
# - This disables most optional in-cluster tools.
# - You must provide external replacements for Git and S3.
# - This example is a password-mode baseline; Skyforge browser login still works via /api/login.
# - If you want prod OIDC, keep Dex enabled and switch skyforge.auth.mode=oidc.
skyforge:
  auth:
    mode: "password"
  gitea:
    enabled: false
    apiUrl: "https://git.example/api/v1"
    url: "https://git.example"
  s3gw:
    enabled: false
  objectStorage:
    endpoint: "s3.example.com:9000"
    useSsl: true
  dex:
    enabled: false
  coder:
    enabled: false
  yaade:
    enabled: false
  redoc:
    enabled: false
  forward:
    enabled: false
  netbox:
    enabled: false
  nautobot:
    enabled: false
  dns:
    enabled: false
